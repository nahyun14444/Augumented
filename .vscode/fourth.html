<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Vesuvio Bakery</title>

    <link rel="stylesheet" href="fourth.css">

    <script
        type="module"
        src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.3.1/model-viewer.min.js">
    </script>
</head>

<body>

    <a class="back-link" href="index.html">← back</a>

    <main class="project">

        <section class="model-area">

            <model-viewer
                src="./model/cafe-fin.glb"
                alt="3D-Modell der Vesuvio Bakery"
                camera-controls
                auto-rotate
                shadow-intensity="1"
                exposure="1">
            </model-viewer>

        </section>

        <section class="project-text">

            <h1>Vesuvio Bakery</h1>

            <p>
                This project transforms a hand-drawn illustration into an
                interactive three-dimensional paper diorama.
            </p>

            <p>
                The individual elements were separated, arranged in Blender
                and exported as a GLB model for the web.
            </p>

            <p class="software">
                Blender · Affinity Designer · HTML · CSS
            </p>

        </section>

    </main>

</body>
</html>
