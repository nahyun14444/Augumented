<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Vesuvio Bakery</title>

    <link rel="stylesheet" href="fourth.css">

    <script
        type="module"
        src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.3.1/model-viewer.min.js">
    </script>

</head>

<body>

    <main class="project">

        <section class="model-area">

            <model-viewer
                id="bakeryModel"
                src="./model/cafe-fin.glb"
                ios-src="./model/3d.usdz"
                alt="3D-Modell der Vesuvio Bakery"

                camera-controls
                auto-rotate

                ar
                ar-modes="webxr scene-viewer quick-look"
                ar-placement="floor"
                ar-scale="auto"

                shadow-intensity="1"
                exposure="1">

                <button slot="ar-button" class="ar-button">
                    View in AR
                </button>

            </model-viewer>

        </section>

    </main>

</body>

</html>
